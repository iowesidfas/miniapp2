<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xeqep MiniApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #03050a;
            --glass-base: rgba(28, 23, 38, 0.34);
            --glass-border: rgba(255, 255, 255, 0.11);
            --accent: #7c4dff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        /* Один плавный градиент вместо четырёх blob'ов */
        .gradient-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: linear-gradient(135deg, #0a0512 0%, #140d1f 100%);
            opacity: 0.92;
        }

        .glass-card {
            width: 90%;
            max-width: 380px;
            background: var(--glass-base);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 48px 28px 42px;
            text-align: center;
            box-shadow: 
                0 28px 64px -16px rgba(0,0,0,0.75),
                inset 0 0 0 1px rgba(255,255,255,0.04);
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(48px);
            animation: cardAppear 1.1s cubic-bezier(0.23,1,0.32,1) forwards;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Лёгкий блик без постоянной анимации */
        .glass-card::after {
            content: "";
            position: absolute;
            inset: -50%;
            background: linear-gradient(
                110deg,
                transparent 35%,
                rgba(255,255,255,0.08) 50%,
                transparent 65%
            );
            transform: rotate(25deg);
            pointer-events: none;
            opacity: 0.6;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.9px;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #fff, #d0c3ff, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 100%;
            animation: titleGradient 8s linear infinite;
        }

        @keyframes titleGradient {
            0%,100% { background-position: 0% 50%; }
            50%     { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 15.5px;
            font-weight: 400;
            line-height: 1.55;
            color: rgba(255,255,255,0.65);
            margin-bottom: 40px;
        }

        .btn {
            width: 100%;
            padding: 17px 24px;
            background: rgba(255,255,255,0.94);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: 24px;
            font-size: 16.5px;
            font-weight: 600;
            color: #0a0512;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 12px 28px -8px rgba(0,0,0,0.45),
                inset 0 0 0 1px rgba(255,255,255,0.38);
            transition: all 0.28s cubic-bezier(0.23,1,0.32,1);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 
                0 16px 36px -10px rgba(0,0,0,0.5),
                inset 0 0 0 1px rgba(255,255,255,0.5);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            background: rgba(255,255,255,0.22);
            color: rgba(255,255,255,0.55);
            border-color: rgba(255,255,255,0.08);
            box-shadow: none;
        }

        .status {
            margin-top: 28px;
            font-size: 14.8px;
            color: #4ade80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.6s ease-out;
        }

        .status.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .checkmark {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(74,222,128,0.14);
            border: 1px solid rgba(74,222,128,0.32);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkmark svg {
            width: 16px;
            height: 16px;
            stroke: #4ade80;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .status.visible .checkmark svg path {
            animation: drawCheck 0.6s cubic-bezier(0.25,0.1,0.25,1) forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        .creator {
            margin-top: 44px;
            font-size: 12.5px;
            color: rgba(255,255,255,0.36);
        }

        .creator a {
            color: rgba(255,255,255,0.74);
            text-decoration: none;
        }

        .creator a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>

    <div class="glass-card">
        <div class="title">Xeqep MiniApp</div>
        <div class="subtitle">Демонстрационное приложение<br>с премиальным стеклом</div>

        <button class="btn" onclick="activate()">Активировать</button>

        <div id="status" class="status">
            <div class="checkmark">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M20 6L9 17L4 12" stroke-dasharray="24" stroke-dashoffset="24"/>
                </svg>
            </div>
            <span>Приложение активно</span>
        </div>

        <div class="creator">
            Создатель: <a href="https://t.me/xeqep" target="_blank">@xeqep</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const card = document.querySelector('.glass-card');
        let rafId = null;
        let timeoutId = null;

        // Очень лёгкий параллакс — обновление не чаще 1 раза в 40–50 мс
        function updateParallax(e) {
            if (timeoutId) return;
            timeoutId = setTimeout(() => {
                const x = (window.innerWidth  / 2 - e.clientX) / 60;
                const y = (window.innerHeight / 2 - e.clientY) / 60;
                card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${y}deg) translateZ(8px)`;
                timeoutId = null;
            }, 40);
        }

        document.addEventListener('mousemove', updateParallax);
        document.addEventListener('touchmove', e => {
            if (e.touches.length) updateParallax(e.touches[0]);
        }, { passive: true });

        document.addEventListener('mouseleave', () => {
            card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) translateZ(0)';
        });

        function activate() {
            const status = document.getElementById('status');
            const btn = document.querySelector('.btn');

            status.classList.add('visible');

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            btn.textContent = 'Активировано';
            btn.disabled = true;

            card.style.transition = 'transform 0.16s ease';
            card.style.transform += ' scale(0.98)';
            setTimeout(() => {
                card.style.transform = card.style.transform.replace(' scale(0.98)', '');
            }, 160);
        }
    </script>
</body>
</html>
