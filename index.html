<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Xeqep MiniApp</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root {
--bg-color:#03050a;
--glass-base:rgba(28,23,38,0.34);
--glass-border:rgba(255,255,255,0.11);
--accent:#7c4dff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
min-height:100vh;
background:var(--bg-color);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
position:relative;
}

/* КОСМИЧЕСКИЙ ФОН */

.gradient-bg{
position:fixed;
inset:0;
z-index:-2;
overflow:hidden;
background:
radial-gradient(circle at 20% 30%, rgba(124,77,255,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(90,120,255,0.15), transparent 45%),
#03050a;
}

/* звёзды */

.gradient-bg::before{
content:"";
position:absolute;
inset:0;

background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 2px, transparent 2px);

background-size:
120px 120px,
200px 200px,
350px 350px;

background-position:
0 0,
40px 60px,
130px 90px;

opacity:.35;
}

/* лёгкая туманность */

.gradient-bg::after{
content:"";
position:absolute;
inset:-30%;

background:
radial-gradient(circle at 40% 60%, rgba(124,77,255,0.25), transparent 60%),
radial-gradient(circle at 70% 20%, rgba(80,120,255,0.2), transparent 65%);

filter:blur(120px);
opacity:.6;
animation:nebulaMove 40s linear infinite;
}

@keyframes nebulaMove{
0%{transform:translate(0,0)}
50%{transform:translate(-4%,3%)}
100%{transform:translate(0,0)}
}

/* КАРТОЧКА */

.glass-card{
width:90%;
max-width:380px;
background:var(--glass-base);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border:1px solid var(--glass-border);
border-radius:36px;
padding:48px 28px 42px;
text-align:center;

box-shadow:
0 28px 64px -16px rgba(0,0,0,0.75),
inset 0 0 0 1px rgba(255,255,255,0.04);

position:relative;
z-index:10;

opacity:0;
transform:translateY(48px);

animation:cardAppear 1.1s cubic-bezier(.23,1,.32,1) forwards;
}

@keyframes cardAppear{
to{opacity:1;transform:translateY(0)}
}

.glass-card::after{
content:"";
position:absolute;
inset:-50%;
background:linear-gradient(
110deg,
transparent 35%,
rgba(255,255,255,0.08) 50%,
transparent 65%
);
transform:rotate(25deg);
pointer-events:none;
opacity:.6;
}

/* TITLE */

.title{
font-size:32px;
font-weight:700;
letter-spacing:-.9px;
margin-bottom:12px;

background:linear-gradient(90deg,#fff,#d0c3ff,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

background-size:200% 100%;

animation:titleGradient 8s linear infinite;
}

@keyframes titleGradient{
0%,100%{background-position:0% 50%}
50%{background-position:100% 50%}
}

.subtitle{
font-size:15.5px;
font-weight:400;
line-height:1.55;
color:rgba(255,255,255,.65);
margin-bottom:40px;
}

/* BUTTON */

.btn{
width:100%;
padding:17px 24px;

background:rgba(255,255,255,.94);
border:1px solid rgba(255,255,255,.22);

border-radius:24px;

font-size:16.5px;
font-weight:600;
color:#0a0512;

cursor:pointer;

position:relative;
overflow:hidden;

box-shadow:
0 12px 28px -8px rgba(0,0,0,.45),
inset 0 0 0 1px rgba(255,255,255,.38);

transition:all .28s cubic-bezier(.23,1,.32,1);
}

.btn:hover{
transform:translateY(-1px);

box-shadow:
0 16px 36px -10px rgba(0,0,0,.5),
inset 0 0 0 1px rgba(255,255,255,.5);
}

.btn:active{
transform:scale(.97);
}

.btn:disabled{
background:rgba(255,255,255,.22);
color:rgba(255,255,255,.55);
border-color:rgba(255,255,255,.08);
box-shadow:none;
}

/* STATUS */

.status{
margin-top:28px;

font-size:14.8px;
color:#4ade80;

display:flex;
align-items:center;
justify-content:center;

gap:12px;

opacity:0;
transform:translateY(14px);

transition:all .6s ease-out;
}

.status.visible{
opacity:1;
transform:translateY(0);
}

.checkmark{
width:28px;
height:28px;

border-radius:50%;

background:rgba(74,222,128,.14);
border:1px solid rgba(74,222,128,.32);

display:flex;
align-items:center;
justify-content:center;
}

.checkmark svg{
width:16px;
height:16px;

stroke:#4ade80;
stroke-width:3;

stroke-linecap:round;
stroke-linejoin:round;
}

.status.visible .checkmark svg path{
animation:drawCheck .6s cubic-bezier(.25,.1,.25,1) forwards;
}

@keyframes drawCheck{
to{stroke-dashoffset:0}
}

.creator{
margin-top:44px;
font-size:12.5px;
color:rgba(255,255,255,.36);
}

.creator a{
color:rgba(255,255,255,.74);
text-decoration:none;
}

.creator a:hover{
color:white;
}

</style>
</head>

<body>

<div class="gradient-bg"></div>

<div class="glass-card">

<div class="title">Xeqep MiniApp</div>

<div class="subtitle">
Демонстрационное приложение<br>
от xeqep.code
</div>

<button class="btn" onclick="activate()">Активировать</button>

<div id="status" class="status">

<div class="checkmark">
<svg viewBox="0 0 24 24" fill="none">
<path d="M20 6L9 17L4 12" stroke-dasharray="24" stroke-dashoffset="24"/>
</svg>
</div>

<span>Приложение активно</span>

</div>

<div class="creator">
Создатель:
<a href="https://t.me/xeqep" target="_blank">@xeqep</a>
</div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();
tg.ready();

const card = document.querySelector('.glass-card');

let timeoutId = null;

function updateParallax(e){

if(timeoutId)return;

timeoutId=setTimeout(()=>{

const x=(window.innerWidth/2-e.clientX)/60;
const y=(window.innerHeight/2-e.clientY)/60;

card.style.transform=
`perspective(1000px) rotateY(${x}deg) rotateX(${y}deg) translateZ(8px)`;

timeoutId=null;

},40);

}

document.addEventListener('mousemove',updateParallax);

document.addEventListener('touchmove',e=>{
if(e.touches.length)updateParallax(e.touches[0]);
},{passive:true});

document.addEventListener('mouseleave',()=>{
card.style.transform='perspective(1000px) rotateY(0deg) rotateX(0deg) translateZ(0)';
});

function activate(){

const status=document.getElementById('status');
const btn=document.querySelector('.btn');

status.classList.add('visible');

if(tg.HapticFeedback){
tg.HapticFeedback.notificationOccurred('success');
}

btn.textContent='Активировано';
btn.disabled=true;

card.style.transition='transform .16s ease';

card.style.transform+=' scale(.98)';

setTimeout(()=>{
card.style.transform=
card.style.transform.replace(' scale(.98)','');
},160);

}

</script>

</body>
</html>
