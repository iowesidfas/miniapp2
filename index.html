<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xeqep MiniApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #03050a;
            --glass-highlight: rgba(255, 255, 255, 0.1);
            --glass-edge: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        /* 🎨 УЛУЧШЕННЫЙ ДИНАМИЧЕСКИЙ ФОН */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(125deg, #0b0710, #130b1c, #0f0a18, #1a0f24);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        /* 🌊 УЛУЧШЕННЫЕ БЛОБЫ */
        .blob-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(70px);
            opacity: 0.5;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: blobMove 25s infinite alternate ease-in-out;
        }

        .blob1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle at 30% 30%, #8b5cf6, #3b82f6);
            top: -20%;
            left: -10%;
            animation-duration: 30s;
        }

        .blob2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle at 70% 70%, #ec4899, #8b5cf6);
            bottom: -20%;
            right: -10%;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .blob3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle at 50% 50%, #6366f1, #a855f7, #2dd4bf);
            top: 40%;
            left: 30%;
            animation-duration: 20s;
            animation-delay: -2s;
        }

        @keyframes blobMove {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            100% {
                transform: translate(150px, 100px) rotate(120deg) scale(1.5);
            }
        }

        /* 🔷 УЛУЧШЕННАЯ СТЕКЛЯННАЯ КАРТОЧКА */
        .glass-card {
            width: 90%;
            max-width: 380px;
            background: rgba(20, 15, 30, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-right-color: rgba(255, 255, 255, 0.08);
            border-bottom-color: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 
                0 30px 60px -20px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset,
                0 0 30px 0 rgba(124, 77, 255, 0.2);
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Эффект свечения по краям */
        .glass-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 2px;
            background: linear-gradient(
                145deg,
                rgba(255, 255, 255, 0.3),
                rgba(255, 255, 255, 0.05),
                rgba(124, 77, 255, 0.2),
                rgba(255, 255, 255, 0.05)
            );
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.6;
        }

        /* Блики на стекле */
        .glass-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: -50%;
            width: 200%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.06),
                transparent
            );
            transform: rotate(25deg);
            animation: shine 8s infinite;
            pointer-events: none;
            border-radius: 40px;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(25deg); }
            20% { transform: translateX(100%) rotate(25deg); }
            100% { transform: translateX(100%) rotate(25deg); }
        }

        /* Внутреннее свечение */
        .card-glow {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.4), transparent 70%);
            filter: blur(40px);
            z-index: -1;
            opacity: 0.7;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.9; transform: translateX(-50%) scale(1.2); }
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #c0b0ff, #fff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 5s ease infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 40px;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        /* 🔘 УЛУЧШЕННАЯ КНОПКА */
        .btn {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            font-size: 17px;
            font-weight: 600;
            color: #0b0710;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            box-shadow: 
                0 15px 30px -10px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.3) inset,
                0 0 20px 0 rgba(124, 77, 255, 0.3);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 
                0 5px 15px -5px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset,
                0 0 30px 0 rgba(124, 77, 255, 0.5);
        }

        .btn:disabled {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            transform: scale(1);
            cursor: not-allowed;
        }

        .btn:disabled::before {
            display: none;
        }

        /* ✅ УЛУЧШЕННЫЙ СТАТУС */
        .status {
            margin-top: 30px;
            font-size: 15px;
            color: #4ade80;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(15px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
        }

        .status.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .checkmark {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(74, 222, 128, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(74, 222, 128, 0.3);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.2);
        }

        .checkmark svg {
            width: 16px;
            height: 16px;
            stroke: #4ade80;
            stroke-width: 3;
            filter: drop-shadow(0 0 5px #4ade80);
        }

        /* 👤 УЛУЧШЕННЫЙ ФУТЕР */
        .creator {
            margin-top: 45px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            display: inline-block;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .creator a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            position: relative;
        }

        .creator a:hover {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .creator a::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .creator a:hover::after {
            transform: scaleX(1);
        }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>
    
    <div class="blob-container">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="glass-card">
        <div class="card-glow"></div>
        
        <div class="title">Xeqep MiniApp</div>
        <div class="subtitle">Демонстрационное приложение с премиальным стеклом</div>

        <button class="btn" onclick="activate()">Активировать</button>

        <div id="status" class="status">
            <div class="checkmark">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17L4 12"/>
                </svg>
            </div>
            <span>Приложение активно</span>
        </div>

        <div class="creator">
            Создатель: <a href="https://t.me/xeqep" target="_blank">@xeqep</a>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Добавляем легкую анимацию параллакса для карточки
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            card.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${y}deg) translateZ(10px)`;
        });

        // Возвращаем в исходное положение при уходе мыши
        document.addEventListener('mouseleave', () => {
            const card = document.querySelector('.glass-card');
            card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) translateZ(0)';
        });

        function activate() {
            const status = document.getElementById('status');
            status.classList.add('visible');

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            const btn = document.querySelector('.btn');
            btn.innerText = 'Активировано ✨';
            btn.disabled = true;
            
            // Добавляем небольшую анимацию карточки
            const card = document.querySelector('.glass-card');
            card.style.transform = 'scale(0.98)';
            setTimeout(() => {
                card.style.transform = 'scale(1)';
            }, 200);
        }
    </script>
</body>
</html>
