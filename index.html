<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Xeqep • Void Interface</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">

<style>

:root{
--bg-deep:#03020a;
--accent-violet:#7c4dff;
--accent-cyan:#22d3ee;
--accent-pink:#ec4899;

--text-primary:#f3efff;
--text-secondary:rgba(225,210,255,.8);
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{
height:100%;
background:var(--bg-deep);
color:var(--text-primary);
font-family:'Inter',system-ui;
overflow:hidden;
}

body{
display:grid;
place-items:center;
min-height:100dvh;
}

/* background */

.cosmos{
position:fixed;
inset:0;
z-index:-2;
pointer-events:none;
}

.cosmos-layer{
position:absolute;
inset:0;
background:radial-gradient(ellipse at 40% 60%,var(--accent-violet),transparent 60%);
opacity:.06;
filter:blur(140px);
animation:cosmos 300s linear infinite;
}

.cosmos-layer:nth-child(2){
background:radial-gradient(ellipse at 70% 20%,var(--accent-cyan),transparent 60%);
animation-delay:-120s;
}

.cosmos-layer:nth-child(3){
background:radial-gradient(ellipse at 20% 80%,var(--accent-pink),transparent 60%);
animation-delay:-200s;
}

@keyframes cosmos{
0%{transform:translate(0,0) scale(1.2)}
100%{transform:translate(-20%,10%) scale(1.6)}
}

canvas{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
}

/* card */

.void-scene{
width:94vw;
max-width:440px;
}

.void-card{
background:rgba(20,16,50,.35);
backdrop-filter:blur(32px);
border-radius:46px;
padding:70px 40px 60px;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 60px 140px -40px rgba(0,0,0,.9);
text-align:center;
transition:transform .25s cubic-bezier(.16,1.3,.3,1.15);
}

/* title */

.title{
font-family:'Orbitron';
font-size:clamp(46px,11vw,78px);
font-weight:900;
letter-spacing:-3px;
background:linear-gradient(90deg,#fff,#c4a1ff,#7c4dff);
-webkit-background-clip:text;
background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.subtitle{
color:var(--text-secondary);
line-height:1.6;
margin-bottom:50px;
}

/* button */

.core-btn{
width:100%;
padding:22px 32px;
border-radius:28px;
font-size:18px;
font-weight:600;
background:#fff;
border:none;
cursor:pointer;
transition:.3s;
}

.core-btn:active{
transform:scale(.95)
}

/* status */

.status-line{
margin-top:40px;
display:flex;
align-items:center;
justify-content:center;
gap:12px;
color:#4ade80;
opacity:0;
transform:translateY(30px);
transition:1s;
}

.status-line.visible{
opacity:1;
transform:translateY(0);
}

.check-ring{
width:36px;
height:36px;
border-radius:50%;
background:rgba(74,222,128,.2);
display:grid;
place-items:center;
}

.check-ring svg{
width:20px;
height:20px;
stroke:#4ade80;
stroke-width:3;
fill:none;
}

.creator-line{
margin-top:60px;
font-size:14px;
color:rgba(255,255,255,.5);
}

.creator-line a{
color:#fff;
text-decoration:none;
}

</style>
</head>

<body>

<div class="cosmos">
<div class="cosmos-layer"></div>
<div class="cosmos-layer"></div>
<div class="cosmos-layer"></div>
</div>

<canvas id="stars"></canvas>

<div class="void-scene" id="scene">
<div class="void-card" id="card">

<h1 class="title">Xeqep</h1>

<div class="subtitle">
Это демонстрационный MiniApp<br>
от @xeqep
</div>

<button class="core-btn" id="activateBtn">
Нажми на меня
</button>

<div class="status-line" id="status">
<div class="check-ring">
<svg viewBox="0 0 24 24">
<path d="M20 6L9 17L4 12"/>
</svg>
</div>
<span>MiniApp Работает</span>
</div>

<div class="creator-line">
realm crafted by <a href="https://t.me/xeqep" target="_blank">@xeqep</a>
</div>

</div>
</div>

<script>

/* telegram */

const tg = window.Telegram.WebApp
tg.expand()
tg.ready()

/* stars canvas */

const canvas = document.getElementById("stars")
const ctx = canvas.getContext("2d",{alpha:true,desynchronized:true})

let width
let height
let dpr

function resize(){

width = window.innerWidth || document.documentElement.clientWidth
height = window.innerHeight || document.documentElement.clientHeight

dpr = Math.min(window.devicePixelRatio || 1,1.5)

canvas.width = width * dpr
canvas.height = height * dpr

canvas.style.width = width+"px"
canvas.style.height = height+"px"

ctx.setTransform(dpr,0,0,dpr,0,0)

}

resize()

let resizeTimer
window.addEventListener("resize",()=>{

clearTimeout(resizeTimer)

resizeTimer=setTimeout(resize,200)

})

/* stars */

const isMobile = width < 768
const STAR_COUNT = isMobile ? 160 : 320

let stars=[]

class Star{

constructor(){
this.reset()
}

reset(){

this.x=Math.random()*width
this.y=Math.random()*height

this.size=Math.random()*2+0.3
this.speed=Math.random()*0.6+0.2

this.opacity=Math.random()*.6+.3
this.twinkle=Math.random()*2+1

}

update(){

this.y+=this.speed

if(this.y>height){

this.y=-10
this.x=Math.random()*width

}

}

draw(t){

const o=this.opacity*(0.6+0.4*Math.sin(t*this.twinkle))

ctx.globalAlpha=o
ctx.fillStyle="#fff"

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()

}

}

for(let i=0;i<STAR_COUNT;i++){
stars.push(new Star())
}

/* star loop */

let time=0

function render(){

time+=0.016

ctx.clearRect(0,0,width,height)

for(let i=0;i<stars.length;i++){

stars[i].update()
stars[i].draw(time)

}

requestAnimationFrame(render)

}

render()

/* parallax */

const scene=document.getElementById("scene")

let cx=0
let cy=0

let tx=0
let ty=0

function pointer(e){

const x=e.clientX || e.touches?.[0]?.clientX
const y=e.clientY || e.touches?.[0]?.clientY

if(!x||!y)return

tx=(window.innerWidth/2-x)/32
ty=(window.innerHeight/2-y)/32

}

window.addEventListener("mousemove",pointer)
window.addEventListener("touchmove",pointer,{passive:true})

function lerp(a,b,t){
return a+(b-a)*t
}

function loop(){

cx=lerp(cx,tx,.07)
cy=lerp(cy,ty,.07)

scene.style.transform=
`rotateX(${cy}deg) rotateY(${cx}deg) translateZ(48px)`

requestAnimationFrame(loop)

}

loop()

/* button */

const btn=document.getElementById("activateBtn")
const status=document.getElementById("status")
const card=document.getElementById("card")

btn.addEventListener("click",()=>{

if(btn.disabled)return

status.classList.add("visible")

tg.HapticFeedback?.notificationOccurred("success")

btn.textContent="Готово"
btn.disabled=true

card.style.transform="scale(.96)"

setTimeout(()=>{

card.style.transform="scale(1)"

},200)

})

</script>

</body>
</html>
